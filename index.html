<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Singapen – Safety Alert App</title>
<meta name="description" content="Singapen connects people who need help with nearby registered helpers instantly, with live location.">
<meta name="theme-color" content="#1B2A41">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

     FIREBASE SDK  (v9 compat CDN – easy drop-in)

     project's config from Firebase Console →
     Project Settings → Your Apps → Web App.

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
/* ════════════════════════════════════════
   DESIGN TOKENS
   ════════════════════════════════════════ */
:root{
  --ink:#1B2A41;
  --ink-soft:#2A3B54;
  --coral:#E8483D;
  --coral-dark:#C73A30;
  --sage:#7FA88E;
  --sage-dark:#5E8A72;
  --gold:#F5A623;
  --paper:#F2F2F2;
  --surface:#FFFFFF;
  --paper-dim:#E8E8E8;
  --slate:#5C6470;
  --line:#E0E0E0;
  --shadow-1:0 1px 3px rgba(0,0,0,0.12),0 1px 2px rgba(0,0,0,0.08);
  --shadow-2:0 3px 6px rgba(0,0,0,0.15),0 2px 4px rgba(0,0,0,0.10);
  --shadow-3:0 10px 20px rgba(0,0,0,0.12),0 6px 6px rgba(0,0,0,0.08);
  --r4:4px; --r12:12px;
  --status-h:28px; --nav-h:48px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{
  font-family:'Roboto','Google Sans',sans-serif;
  background:linear-gradient(135deg,#0f1923 0%,#1a2a3a 100%);
  min-height:100%;
  overscroll-behavior:none;
}

/* ── Phone shell ── */
.phone-shell{
  width:390px; min-height:844px;
  margin:0 auto;
  background:var(--paper);
  display:flex; flex-direction:column;
  overflow:hidden;
  border-radius:40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 1.5px #2a2a2a;
  min-height:100vh;
}

/* ── Status bar ── */
.status-bar{
  height:var(--status-h);
  background:var(--ink);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; flex-shrink:0; z-index:20;
}
.status-bar .time{font-size:12px;font-weight:700;color:#fff;letter-spacing:.03em;}
.status-bar .icons{display:flex;align-items:center;gap:5px;}
.status-bar .icons svg{width:14px;height:14px;fill:#fff;}

/* ── App bar ── */
.app-bar{
  height:56px; background:var(--ink);
  display:flex; align-items:center; padding:0 16px; gap:12px;
  flex-shrink:0; box-shadow:var(--shadow-1); z-index:10;
}
.app-bar .back-ico{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;transition:background .2s;
}
.app-bar .back-ico:active{background:rgba(255,255,255,0.12);}
.app-bar .bar-title{
  font-family:'Google Sans','Roboto',sans-serif;
  font-size:20px;font-weight:500;color:#fff;flex:1;letter-spacing:.01em;
  display:flex;align-items:center;gap:10px;
}
.app-bar .bar-icon{
  width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;
}
.app-bar .bar-action{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;background:none;border:none;
  font-family:inherit;transition:background .2s;letter-spacing:.02em;
}
.app-bar .bar-action:active{background:rgba(255,255,255,0.12);}

/* ── Screen ── */
.screen{
  flex:1;display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  animation:slideUp .28s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@media(prefers-reduced-motion:reduce){.screen{animation:none;}}
.screen-body{flex:1;display:flex;flex-direction:column;padding:20px 16px 24px;}

/* ── Nav bar ── */
.nav-bar{
  height:var(--nav-h);background:var(--ink);
  display:flex;align-items:center;justify-content:center;gap:48px;flex-shrink:0;
}
.nav-bar .nav-ico{
  width:28px;height:28px;opacity:0.6;display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;
}

/* ════════════════════════════════════════
   LANDING SCREEN
   ════════════════════════════════════════ */
.landing-hero{
  background:var(--ink);
  padding:32px 20px 28px;
  display:flex; flex-direction:column; gap:6px;
  position:relative; overflow:hidden;
}
.landing-hero::before{
  content:'';position:absolute;top:-60px;right:-40px;
  width:200px;height:200px;border-radius:50%;
  background:rgba(232,72,61,0.08);
}
.landing-hero::after{
  content:'';position:absolute;bottom:-40px;left:-20px;
  width:140px;height:140px;border-radius:50%;
  background:rgba(127,168,142,0.07);
}

/* ── App icon on landing ── */
.app-icon-wrap{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:1;
}
.app-icon-circle{
  width:58px;height:58px;border-radius:16px;
  background:linear-gradient(135deg,#C73A30 0%,#E8483D 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(232,72,61,0.4);
  flex-shrink:0;
}
.app-name-block strong{
  display:block;font-family:'Google Sans','Roboto',sans-serif;
  font-size:24px;font-weight:700;color:#fff;letter-spacing:.01em;
}
.app-name-block span{
  font-size:12px;font-weight:500;color:rgba(255,255,255,0.55);
  letter-spacing:.08em;text-transform:uppercase;
}

.landing-hero h1{
  font-family:'Google Sans','Roboto',sans-serif;
  font-size:22px;font-weight:700;color:#fff;line-height:1.3;
  letter-spacing:-.01em;position:relative;z-index:1;
}
.landing-hero p{
  font-size:14px;color:rgba(255,255,255,0.6);line-height:1.55;
  margin-top:4px;position:relative;z-index:1;
}

/* safety badge */
.safety-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);
  border-radius:20px;padding:5px 12px;margin-top:12px;width:fit-content;
  position:relative;z-index:1;
}
.safety-badge span{font-size:11.5px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;}

/* ── Role cards ── */
.role-list{display:flex;flex-direction:column;gap:12px;padding:16px 16px 0;}
.role-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border-radius:var(--r12);
  padding:16px;cursor:pointer;text-align:left;
  box-shadow:var(--shadow-1);position:relative;overflow:hidden;border:none;
  transition:box-shadow .2s;
}
.role-card::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .2s;}
.role-card:active::after{background:rgba(0,0,0,0.06);}
.role-card:hover{box-shadow:var(--shadow-2);}
.role-icon{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.role-icon.user{background:rgba(232,72,61,0.1);}
.role-icon.helper{background:rgba(127,168,142,0.16);}
.role-card .role-text{flex:1;}
.role-card .role-text strong{display:block;font-size:15px;font-weight:500;color:var(--ink);margin-bottom:2px;}
.role-card .role-text span{font-size:13px;color:var(--slate);}
.role-card .chev{color:var(--slate);font-size:20px;}

/* ════════════════════════════════════════
   FORM FIELDS
   ════════════════════════════════════════ */
.field{margin-bottom:16px;position:relative;}
.field .m-label{
  font-size:12px;font-weight:500;color:var(--slate);
  letter-spacing:.04em;margin-bottom:4px;display:block;text-transform:uppercase;
}
.field input,.field select{
  width:100%;padding:14px;
  border:none;border-bottom:2px solid var(--line);
  border-radius:var(--r4) var(--r4) 0 0;
  background:var(--surface);font-size:16px;
  font-family:'Roboto',sans-serif;color:var(--ink);
  outline:none;transition:border-color .2s;box-shadow:var(--shadow-1);
}
.field input:focus,.field select:focus{border-bottom-color:var(--coral);}
.field input::placeholder{color:#aaa;}
.field .hint{font-size:11.5px;color:var(--slate);margin-top:5px;padding-left:14px;}

/* password visibility toggle */
.field .pw-wrap{position:relative;}
.field .pw-wrap input{padding-right:48px;}
.field .pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--slate);font-size:18px;padding:4px;
}

/* ════════════════════════════════════════
   BUTTONS
   ════════════════════════════════════════ */
.btn{
  width:100%;padding:0 24px;height:48px;
  border-radius:var(--r4);border:none;
  font-size:14px;font-weight:700;font-family:'Google Sans','Roboto',sans-serif;
  letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;
  transition:box-shadow .2s,opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s;}
.btn:active::after{background:rgba(255,255,255,0.12);}
.btn:active{transform:scale(0.99);}
.btn:disabled{opacity:.4;pointer-events:none;}

.btn-primary{background:var(--ink);color:#fff;box-shadow:var(--shadow-1);}
.btn-primary:hover{box-shadow:var(--shadow-2);}
.btn-coral{background:var(--coral);color:#fff;box-shadow:var(--shadow-1);}
.btn-coral:hover{box-shadow:var(--shadow-2);}
.btn-sage{background:var(--sage);color:#fff;box-shadow:var(--shadow-1);}
.btn-sage:hover{box-shadow:var(--shadow-2);}
.btn-outlined{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-outlined::after{background:rgba(0,0,0,0);}
.btn-outlined:active::after{background:rgba(0,0,0,0.06);}
.btn-text{
  background:none;border:none;color:var(--coral);
  font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  cursor:pointer;padding:10px 16px;font-family:'Google Sans','Roboto',sans-serif;
  position:relative;overflow:hidden;border-radius:var(--r4);
  display:inline-flex;align-items:center;justify-content:center;transition:background .2s;
}
.btn-text:hover{background:rgba(232,72,61,0.08);}

/* spinner inside button */
.btn-spinner{
  width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;
  animation:spin .7s linear infinite;display:none;
}
.btn.loading .btn-spinner{display:block;}
.btn.loading .btn-label{display:none;}

/* ════════════════════════════════════════
   ERROR / INFO BANNERS
   ════════════════════════════════════════ */
.error-banner{
  background:rgba(232,72,61,0.08);border-left:3px solid var(--coral);
  color:var(--coral-dark);border-radius:0 var(--r4) var(--r4) 0;
  padding:11px 14px;font-size:13.5px;margin-bottom:14px;font-weight:500;
}
.info-banner{
  background:rgba(127,168,142,0.1);border-left:3px solid var(--sage);
  color:var(--sage-dark);border-radius:0 var(--r4) var(--r4) 0;
  padding:11px 14px;font-size:13.5px;margin-bottom:14px;font-weight:500;
  display:flex;align-items:center;gap:8px;
}
.cloud-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(127,168,142,0.14);border-radius:10px;padding:3px 9px;
  font-size:11px;font-weight:700;color:var(--sage-dark);letter-spacing:.04em;
}

/* ════════════════════════════════════════
   USER HOME
   ════════════════════════════════════════ */
.home-surface{
  background:var(--surface);margin:0 0 1px;padding:20px 16px 16px;
}
.home-greeting{font-size:13px;color:var(--slate);margin-bottom:2px;}
.home-name{font-family:'Google Sans','Roboto',sans-serif;font-size:22px;font-weight:700;color:var(--ink);}
.home-meta{font-size:12px;color:var(--slate);margin-top:4px;}

.status-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(127,168,142,0.14);border-radius:16px;
  padding:5px 11px;font-size:12px;font-weight:500;color:var(--sage-dark);margin-top:12px;
}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--sage);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ── HELP button ── */
.help-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:28px 16px;
}
.help-button{
  width:188px;height:188px;border-radius:50%;
  background:var(--coral);color:#fff;border:none;
  font-family:'Google Sans','Roboto',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;
  box-shadow:0 12px 28px rgba(232,72,61,0.45),0 0 0 10px rgba(232,72,61,0.1);
  transition:transform .15s cubic-bezier(0.4,0,0.2,1),box-shadow .15s;
  position:relative;overflow:hidden;
}
.help-button::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:rgba(255,255,255,0);transition:background .2s;
}
.help-button:active{transform:scale(0.95);box-shadow:0 6px 14px rgba(232,72,61,0.4);}
.help-button:active::after{background:rgba(255,255,255,0.12);}
.help-button .label{font-size:24px;font-weight:700;letter-spacing:.08em;}
.help-button .sub{font-size:11.5px;font-weight:500;opacity:.88;}

.help-caption{font-size:13px;color:var(--slate);text-align:center;max-width:260px;line-height:1.55;}

/* sending / sent states */
.sending-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;flex:1;padding:28px 16px;
}
.ring{
  width:132px;height:132px;border-radius:50%;
  border:4px solid var(--paper-dim);border-top-color:var(--coral);
  animation:spin .85s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.sent-check{
  width:132px;height:132px;border-radius:50%;
  background:rgba(127,168,142,0.14);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;color:var(--sage-dark);
  animation:popIn .35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{transform:scale(0.6);opacity:0;}to{transform:scale(1);opacity:1;}}

/* ════════════════════════════════════════
   HELPER DASHBOARD
   ════════════════════════════════════════ */
.tab-row{
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;
}
.tab{
  flex:1;text-align:center;padding:14px 8px;
  font-size:13.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--slate);cursor:pointer;
  border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s;
  font-family:'Google Sans','Roboto',sans-serif;
}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);}

/* alert cards */
.alert-list{padding:8px 0 16px;}
.alert-card{
  background:var(--surface);margin:8px 12px;
  border-radius:var(--r12);box-shadow:var(--shadow-1);
  overflow:hidden;position:relative;
}
.alert-card-inner{padding:16px 16px 14px;}
.accent-bar{height:4px;background:var(--coral);width:100%;}
.alert-card.resolved .accent-bar{background:var(--sage);}
.alert-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(232,72,61,0.1);color:var(--coral-dark);
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:3px;margin-bottom:9px;
}
.alert-chip.resolved{background:rgba(127,168,142,0.15);color:var(--sage-dark);}
.alert-card .who{font-family:'Google Sans','Roboto',sans-serif;font-size:16px;font-weight:700;color:var(--ink);}
.alert-card .msg{font-size:14px;color:var(--ink-soft);margin-top:3px;line-height:1.4;}
.alert-card .when{font-size:12px;color:var(--slate);margin-top:6px;}
.card-actions{
  display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
}
.card-actions a{text-decoration:none;flex:1;}
.card-actions .btn{height:36px;font-size:12px;padding:0 12px;border-radius:var(--r4);}

/* ── Empty state ── */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--slate);padding:48px 24px;text-align:center;
}
.empty-state .icon{font-size:44px;margin-bottom:6px;}
.empty-state strong{font-size:15px;color:var(--ink-soft);font-weight:500;}
.empty-state span{font-size:13.5px;line-height:1.5;}

/* ── Snackbar ── */
.snackbar{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:#323232;color:#fff;
  padding:12px 18px;border-radius:var(--r4);
  font-size:14px;font-family:'Roboto',sans-serif;
  box-shadow:var(--shadow-3);z-index:50;max-width:88%;white-space:nowrap;
  animation:sbIn .25s cubic-bezier(0.4,0,0.2,1);
}
@keyframes sbIn{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}

/* ── Misc ── */
.spacer{flex:1;}
.login-link-row{text-align:center;padding:14px 0 4px;}
footer.legal{text-align:center;font-size:11px;color:var(--slate);padding:12px 20px 0;line-height:1.5;}

/* loading overlay */
.loading-overlay{
  position:absolute;inset:0;background:rgba(242,242,242,0.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:30;
}
.loading-overlay .ring{width:48px;height:48px;border-width:3px;}
.loading-overlay span{font-size:13px;color:var(--slate);font-weight:500;}

/* cloud status bar */
.cloud-status{
  background:var(--surface);padding:8px 16px;
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.cloud-status .cs-left{display:flex;align-items:center;gap:8px;}
.cloud-status .cs-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);}
.cloud-status .cs-dot.offline{background:#aaa;}
.cloud-status .cs-text{font-size:12px;color:var(--slate);}

/* profile section */
.profile-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--surface);
  border-bottom:1px solid var(--line);
}
.avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--coral) 0%,var(--coral-dark) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;color:#fff;font-family:'Google Sans',sans-serif;
  flex-shrink:0;
}
.avatar.helper-av{background:linear-gradient(135deg,var(--sage) 0%,var(--sage-dark) 100%);}
.profile-info strong{font-size:14px;font-weight:600;color:var(--ink);display:block;}
.profile-info span{font-size:12px;color:var(--slate);}
</style>
</head>
<body>

<div class="phone-shell" id="phone">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="time" id="clock">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4 2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <div id="app" style="flex:1;display:flex;flex-direction:column;min-height:0;position:relative;"></div>

  <!-- Android nav bar -->
  <div class="nav-bar">
    <div class="nav-ico" id="nav-back" onclick="navBack()">◁</div>
    <div class="nav-ico">◉</div>

<script>
/* ════════════════════════════════════════════════════════════
   ★  FIREBASE CONFIGURATION
   ────────────────────────────────────────────────────────────
   Replace EVERY value below with your own Firebase project.
   Steps:
   1. Go to https://console.firebase.google.com
   2. Create a project → Add a Web App
   3. Copy the firebaseConfig object and paste it here
   4. Enable Firestore in "Build → Firestore Database"
   5. Enable Anonymous Auth in "Build → Authentication"
   ════════════════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  authDomain:        "your-project.firebaseapp.com",
  projectId:         "your-project",
  storageBucket:     "your-project.appspot.com",
  messagingSenderId: "000000000000",
  appId:             "1:000000000000:web:xxxxxxxxxxxxxxxx"
};

/* ── Init Firebase (graceful fallback to localStorage if not configured) ── */
let db = null;
let firebaseReady = false;

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  // Enable offline persistence
  db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
  firebase.auth().signInAnonymously().then(() => { firebaseReady = true; }).catch(() => {});
} catch(e) {
  console.warn('Firebase not configured – using localStorage fallback');
}

/* ════════════════════════════════════════════════════════════
   STORAGE LAYER
   Tries Firestore first; falls back to localStorage.
   Collections: "users" and "alerts"
   ════════════════════════════════════════════════════════════ */

/* ── localStorage helpers (fallback) ── */
const LS = 'singapen:';
function lsIndex(){ try{ const r=localStorage.getItem(LS+'__idx__'); return r?JSON.parse(r):[]; }catch(e){return[];} }
function lsAddIdx(k){ const i=lsIndex(); if(!i.includes(k)){i.push(k);localStorage.setItem(LS+'__idx__',JSON.stringify(i));} }

/* ── Universal storage API ── */
const DB = {

  /* Save a user record */
  async saveUser(rec) {
    if (firebaseReady && db) {
      await db.collection('users').doc(rec.id).set(rec);
    } else {
      localStorage.setItem(LS+'dir:'+rec.id, JSON.stringify(rec));
      lsAddIdx('dir:'+rec.id);
    }
  },

  /* Find user by phone + password */
  async findUser(phone, pass) {
    if (firebaseReady && db) {
      const snap = await db.collection('users')
        .where('phone', '==', phone)
        .where('pass', '==', pass)
        .limit(1).get();
      if (snap.empty) return null;
      return snap.docs[0].data();
    } else {
      const keys = lsIndex().filter(k => k.startsWith('dir:'));
      for (const k of keys) {
        try {
          const r = JSON.parse(localStorage.getItem(LS+k));
          if (r && r.phone === phone && r.pass === pass) return r;
        } catch(e){}
      }
      return null;
    }
  },

  /* Check phone uniqueness */
  async phoneExists(phone) {
    if (firebaseReady && db) {
      const snap = await db.collection('users').where('phone','==',phone).limit(1).get();
      return !snap.empty;
    } else {
      const keys = lsIndex().filter(k => k.startsWith('dir:'));
      for (const k of keys) {
        try {
          const r = JSON.parse(localStorage.getItem(LS+k));
          if (r && r.phone === phone) return true;
        } catch(e){}
      }
      return false;
    }
  },

  /* Save an alert */
  async saveAlert(alertRec) {
    if (firebaseReady && db) {
      await db.collection('alerts').doc(alertRec.id).set(alertRec);
    } else {
      localStorage.setItem(LS+'alert:'+alertRec.id, JSON.stringify(alertRec));
      lsAddIdx('alert:'+alertRec.id);
    }
  },

  /* Update alert (e.g. mark resolved) */
  async updateAlert(id, data) {
    if (firebaseReady && db) {
      await db.collection('alerts').doc(id).update(data);
    } else {
      const k = LS+'alert:'+id;
      try {
        const r = JSON.parse(localStorage.getItem(k));
        localStorage.setItem(k, JSON.stringify({...r, ...data}));
      } catch(e){}
    }
  },

  /* Get all alerts */
  async getAlerts() {
    if (firebaseReady && db) {
      const snap = await db.collection('alerts')
        .orderBy('createdAt','desc').limit(200).get();
      return snap.docs.map(d => d.data());
    } else {
      const keys = lsIndex().filter(k => k.startsWith('alert:'));
      const alerts = [];
      for (const k of keys) {
        try { const r = JSON.parse(localStorage.getItem(LS+k)); if(r) alerts.push(r); } catch(e){}
      }
      return alerts.sort((a,b) => b.createdAt - a.createdAt);
    }
  },

  /* Get all helpers (for counting nearby) */
  async getHelpers() {
    if (firebaseReady && db) {
      const snap = await db.collection('users').where('type','==','helper').get();
      return snap.docs.map(d => d.data());
    } else {
      const keys = lsIndex().filter(k => k.startsWith('dir:'));
      const helpers = [];
      for (const k of keys) {
        try { const r = JSON.parse(localStorage.getItem(LS+k)); if(r && r.type==='helper') helpers.push(r); } catch(e){}
      }
      return helpers;
    }
  }
};

/* ════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════ */
function uid(p){ return p+'_'+Math.random().toString(36).slice(2,10); }

function getLocation(){
  return new Promise(r=>{
    if(!navigator.geolocation){ r(null); return; }
    navigator.geolocation.getCurrentPosition(
      p=>r({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>r(null),
      {enableHighAccuracy:true,timeout:7000}
    );
  });
}

function haversineKm(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

  t=document.createElement('div');

  document.body.appendChild(t);
  clearTimeout(_snackTimer);
  _snackTimer=setTimeout(()=>t.remove(),3000);
}

function initials(name){
  return name.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}

      </div>
    </div>
    <div class="spacer" style="min-height:24px;"></div>
    <button class="btn btn-primary" id="l-submit">
      <div class="btn-spinner"></div>
      <span class="btn-label">Log in</span>
    </button>
  `;
  el.appendChild(body);

  body.querySelector('#toggle-pw').onclick=()=>{
    const i=body.querySelector('#l-pass');i.type=i.type==='password'?'text':'password';
  };

  body.querySelector('#l-submit').onclick=async(e)=>{
    const btn=e.currentTarget;
    const phone=body.querySelector('#l-phone').value.trim();
    const pass=body.querySelector('#l-pass').value;
    if(!phone||!pass){App.error='Please enter your phone number and password.';render();return;}
    btn.classList.add('loading');btn.disabled=true;
    try{
      const found=await DB.findUser(phone,pass);
      if(!found){App.error='No account found with that phone number and password.';render();btn.classList.remove('loading');btn.disabled=false;return;}
      sessionStorage.setItem('singapen_user',JSON.stringify(found));
      App.currentUser=found;
      App.view=found.type==='user'?'user-home':'helper-home';
      App.error='';render();
    }catch(err){App.error='Login failed. Please try again.';render();btn.classList.remove('loading');btn.disabled=false;}
  };
}

/* ════════════════════════════════════════════════════════════
   USER HOME
   ════════════════════════════════════════════════════════════ */
async function renderUserHome(el){
  const u=App.currentUser;
  el.appendChild(appBar('Singapen',null,'Exit',()=>{
    sessionStorage.removeItem('singapen_user');
    App.currentUser=null;App.view='landing';App.helpSentAt=null;render();
  },true));

  /* profile strip */
  const pr=document.createElement('div');
  pr.className='profile-row';
  pr.innerHTML=`
    <div class="avatar">${initials(u.name)}</div>
    <div class="profile-info">
      <strong>${u.name}</strong>
      <span>${u.phone}${u.contact?' · Contact: '+u.contact:''}</span>
    </div>
    ${braveWomanSVG(28)}
  `;
  el.appendChild(pr);

  const body=document.createElement('div');
  body.className='screen-body';
  body.style.padding='0';
  body.innerHTML=`
    <div class="home-surface">
      <div class="home-greeting">Hello,</div>
      <div class="home-name">${u.name}</div>
      <div class="status-chip"><div class="pulse"></div>Location sharing ready</div>
    </div>
    <div class="help-zone" id="help-zone"></div>
  `;
  el.appendChild(body);
  renderHelpZone(body.querySelector('#help-zone'));
}

function renderHelpZone(zone){
  if(App.sendingHelp){
    zone.innerHTML=`
      <div class="sending-state">
        <div class="ring"></div>
        <div class="help-caption"><strong style="color:var(--ink)">Sending your location…</strong><br>Alerting helpers nearby. Hold tight.</div>
      </div>`;
    return;
  }
  if(App.helpSentAt){
    zone.innerHTML=`
      <div class="sending-state">
        <div class="sent-check">✓</div>
        <div class="help-caption">
          <strong style="color:var(--ink)">Help alert sent</strong><br>
          ${App.lastHelperCount||0} nearby helper(s) notified · ${timeAgo(App.helpSentAt)}
        </div>
        <button class="btn btn-outlined" id="send-again" style="width:auto;padding:0 28px;margin-top:8px;">Send again</button>
      </div>`;
    zone.querySelector('#send-again').onclick=()=>{App.helpSentAt=null;render();};
    return;
  }
  zone.innerHTML=`
    <button class="help-button" id="help-btn">
      <span class="label">HELP</span>
      <span class="sub">tap to alert helpers</span>
    </button>
    <div class="help-caption">Sends your name and live location to registered helpers nearby — instantly.</div>`;
  zone.querySelector('#help-btn').onclick=sendHelp;
}

async function sendHelp(){
  App.sendingHelp=true;render();
  const u=App.currentUser;
  const loc=await getLocation();
  const alertId=uid('alert');
  const alertRec={
    id:alertId,userId:u.id,userName:u.name,userPhone:u.phone,
    message:'Need help',loc,createdAt:Date.now(),resolved:false,resolvedAt:null,resolvedBy:null
  };
  let nearbyCount=0;
  try{
    const helpers=await DB.getHelpers();
    if(loc){
      for(const h of helpers){if(h.loc){const d=haversineKm(loc.lat,loc.lng,h.loc.lat,h.loc.lng);if(d<=(h.radius||5))nearbyCount++;}}
    } else {
      nearbyCount=helpers.length;
    }
    await DB.saveAlert(alertRec);
  }catch(e){ nearbyCount=0; }
  await new Promise(r=>setTimeout(r,900));
  App.sendingHelp=false;App.helpSentAt=Date.now();App.lastHelperCount=nearbyCount;render();
  showSnack(nearbyCount>0?`${nearbyCount} helper(s) notified`:'Alert saved — waiting for a helper');
}

/* ════════════════════════════════════════════════════════════
   HELPER HOME
   ════════════════════════════════════════════════════════════ */
async function renderHelperHome(el){
  const h=App.currentUser;
  el.appendChild(appBar('Helper dashboard',null,'Exit',()=>{
    sessionStorage.removeItem('singapen_user');
    App.currentUser=null;App.view='landing';render();
  },true));

  /* profile strip */
  const pr=document.createElement('div');
  pr.className='profile-row';
  pr.innerHTML=`
    <div class="avatar helper-av">${initials(h.name)}</div>
    <div class="profile-info">
      <strong>${h.name}</strong>
      <span>${h.role||'Helper'} · ${h.phone}</span>
    </div>
    ${braveWomanSVG(28)}
  `;
  el.appendChild(pr);

  const statusBar=document.createElement('div');
  statusBar.style.cssText='background:var(--surface);padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;';
  statusBar.innerHTML=`
    <div class="status-chip"><div class="pulse"></div>Watching within ${h.radius||5} km</div>
    <span style="font-size:12px;color:var(--slate);">Auto-refresh every 5s</span>
  `;
  el.appendChild(statusBar);

  const tabs=document.createElement('div');
  tabs.className='tab-row';
  tabs.innerHTML=`
    <div class="tab ${App.helperTab==='active'?'active':''}" id="tab-active">🔴 Active</div>
    <div class="tab ${App.helperTab==='resolved'?'active':''}" id="tab-resolved">✓ Resolved</div>
  `;

  const list=document.createElement('div');
  list.className='alert-list';
  list.id='alert-list';

  el.appendChild(tabs);
  el.appendChild(list);

  tabs.querySelector('#tab-active').onclick=()=>{App.helperTab='active';render();};
  tabs.querySelector('#tab-resolved').onclick=()=>{App.helperTab='resolved';render();};

  await loadAlerts(list,h);
}

async function loadAlerts(listEl,helper){
  listEl.innerHTML=`<div class="empty-state"><div class="ring" style="width:36px;height:36px;border-width:3px;"></div></div>`;
  let alerts=[];
  try{ alerts=await DB.getAlerts(); }catch(e){}

  if(helper.loc){
    alerts=alerts.filter(a=>{if(!a.loc)return true;return haversineKm(helper.loc.lat,helper.loc.lng,a.loc.lat,a.loc.lng)<=(helper.radius||5);});
  }
  const filtered=alerts.filter(a=>App.helperTab==='active'?!a.resolved:a.resolved);

  if(filtered.length===0){
    listEl.innerHTML=`
      <div class="empty-state">
        <div class="icon">${App.helperTab==='active'?'🛡️':'✅'}</div>
        <strong>${App.helperTab==='active'?'No active alerts':'No resolved alerts yet'}</strong>
        <span>${App.helperTab==='active'?"You'll be notified the moment someone nearby taps Help.":''}</span>
      </div>`;
    return;
  }

  listEl.innerHTML='';
  filtered.forEach(a=>{
    const card=document.createElement('div');
    card.className='alert-card'+(a.resolved?' resolved':'');
    const dist=(helper.loc&&a.loc)?haversineKm(helper.loc.lat,helper.loc.lng,a.loc.lat,a.loc.lng).toFixed(1)+' km away':'Location N/A';
    const mapLink=a.loc?`https://www.google.com/maps?q=${a.loc.lat},${a.loc.lng}`:null;
    card.innerHTML=`
      <div class="accent-bar"></div>
      <div class="alert-card-inner">
        <div class="alert-chip ${a.resolved?'resolved':''}">${a.resolved?'✓ Resolved':'● Live alert'}</div>
        <div class="who">${a.userName}</div>
        <div class="msg">"${a.message}"</div>
        <div class="when">${dist} &nbsp;·&nbsp; ${timeAgo(a.createdAt)} &nbsp;·&nbsp; ${a.userPhone}</div>
        <div class="card-actions">
          ${mapLink?`<a href="${mapLink}" target="_blank" rel="noopener"><button class="btn btn-outlined" style="height:36px;font-size:12px;">📍 View map</button></a>`:''}
          ${!a.resolved?`<button class="btn btn-sage" data-resolve="${a.id}" style="height:36px;font-size:12px;">✓ Mark resolved</button>`:''}
        </div>
      </div>`;
    listEl.appendChild(card);
    if(!a.resolved){
      card.querySelector('[data-resolve]').onclick=async(e)=>{
        const btn=e.currentTarget;btn.disabled=true;btn.textContent='Saving…';
        try{
          await DB.updateAlert(a.id,{resolved:true,resolvedAt:Date.now(),resolvedBy:helper.id});
          showSnack('Marked as resolved ✓');render();
        }catch(err){btn.disabled=false;btn.textContent='✓ Mark resolved';}
      };
    }
  });
}

/* ── Auto-refresh ── */
setInterval(()=>{
  if(App.view==='helper-home'&&App.currentUser){
    const el=document.getElementById('alert-list');
    if(el) loadAlerts(el,App.currentUser);
  }
},5000);

/* ── Boot ── */
render();
</script>
